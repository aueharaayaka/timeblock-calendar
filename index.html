<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="TimeBlock - 週間タイムブロッキングカレンダー。タスク管理・工数管理・当番スケジュールを一元管理。">
<meta name="author" content="aueharaayaka">
<title>TimeBlock | 週間タイムブロッキングカレンダー</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAF9;
  --surface: #FFFFFF;
  --border: #E8E8E5;
  --border-light: #F0F0ED;
  --text-primary: #1A1A18;
  --text-secondary: #6B6B65;
  --text-muted: #A8A8A2;
  --accent: #1A1A18;
  --accent-light: #F5F5F2;
  --weekend-bg: #F7F7F5;
  --weekend-text: #B0B0A8;
  --hour-h: 56px;
  --snap-h: 14px; /* 15min */
  --task-panel: 300px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  touch-action: none;
}

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 52px;
  flex-shrink: 0;
}
.logo {
  font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-right: 24px;
}

/* タブ */
.tabs {
  display: flex;
  align-items: stretch;
  height: 100%;
  gap: 2px;
  margin-right: 16px;
}
.tab-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 500;
  background: none; border: none;
  padding: 0 14px;
  cursor: pointer;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  letter-spacing: 0.04em;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active { color: var(--text-primary); border-bottom-color: var(--accent); }

.week-nav { display: flex; align-items: center; gap: 6px; }
.month-label {
  font-size: 16px; font-weight: 600; letter-spacing: 0.01em;
  color: var(--text-primary); white-space: nowrap; margin-right: 4px;
}
.week-nav button {
  background: none; border: 1px solid var(--border);
  width: 26px; height: 26px; border-radius: 5px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary); font-size: 12px; transition: background 0.15s;
}
.week-nav button:hover { background: var(--accent-light); }
.week-label { font-size: 12px; font-weight: 500; min-width: 130px; text-align: center; }
.header-spacer { flex: 1; }
.today-btn {
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
  background: var(--accent); color: #fff; border: none;
  padding: 5px 12px; border-radius: 5px; cursor: pointer; transition: opacity 0.15s;
}
.today-btn:hover { opacity: 0.75; }

/* ── VIEWS ── */
.view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.view.active { display: flex; }

/* ══════════════════════════════════════
   CALENDAR VIEW
══════════════════════════════════════ */
.cal-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* タスクパネル */
.task-panel {
  width: var(--task-panel);
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.task-panel-head {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.task-panel-title {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-muted);
}
.add-task-btn {
  background: none; border: 1px solid var(--border);
  width: 20px; height: 20px; border-radius: 4px;
  cursor: pointer; font-size: 14px; line-height: 1;
  color: var(--text-muted); display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.add-task-btn:hover { background: var(--accent-light); color: var(--text-primary); }

.task-list {
  flex: 1; overflow-y: auto; padding: 6px;
}
.task-list::-webkit-scrollbar { width: 3px; }
.task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.task-item {
  padding: 6px 8px;
  border-radius: 5px;
  margin-bottom: 3px;
  cursor: grab;
  user-select: none;
  border-left: 3px solid transparent;
  font-size: 11px;
  font-weight: 500;
  line-height: 1.3;
  transition: box-shadow 0.1s;
}
.task-item:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.task-item.dragging { opacity: 0.3; }
.task-item-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-item-hours {
  font-family: 'DM Mono', monospace;
  font-size: 9px; opacity: 0.65; margin-top: 1px;
}

/* カレンダー本体 */
.cal-grid-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.day-headers {
  background: var(--surface);
  display: flex;
  border-bottom: 1px solid var(--border);
  padding-left: 48px;
  padding-right: 4px; /* スクロールバー幅分オフセット */
  flex-shrink: 0;
}
.day-header {
  flex: 1; text-align: center; padding: 8px 4px;
  border-right: 1px solid var(--border-light);
}
.day-header:last-child { border-right: none; }
.day-header.weekend { background: var(--weekend-bg); }
.day-name {
  font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; display: block;
  color: var(--text-muted);
}
.day-header.weekend .day-name { color: var(--weekend-text); }
.day-num {
  font-size: 16px; font-weight: 300;
  display: block; margin-top: 1px; line-height: 1;
}
.day-header.weekend .day-num { color: var(--weekend-text); }
.day-header.today .day-num {
  background: var(--accent); color: #fff;
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 1px auto 0; font-size: 13px; font-weight: 500;
}

.grid-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden; position: relative;
  touch-action: pan-y;
}
.grid-scroll::-webkit-scrollbar { width: 4px; }
.grid-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.grid-inner { display: flex; min-height: calc(var(--hour-h) * 24); background: #fff; }

.time-axis { width: 48px; flex-shrink: 0; position: relative; background: #fff; }
.time-tick {
  position: absolute; left: 0; right: 0;
  display: flex; align-items: flex-start;
  padding-right: 8px; justify-content: flex-end;
}
.time-tick span {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--text-muted); font-weight: 300; margin-top: -5px;
}

.day-columns { flex: 1; display: flex; position: relative; }
.day-col {
  flex: 1; position: relative;
  border-right: 1px solid var(--border-light);
  background: #fff;
  cursor: crosshair;
}
.day-col:last-child { border-right: none; }
.day-col.weekend { background: var(--weekend-bg); }
.day-col.drop-target::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(26,26,24,0.04); pointer-events: none;
}

.hour-line { position: absolute; left: 0; right: 0; border-top: 1px solid var(--border-light); }
.hour-line.major { border-color: var(--border); }

.now-line {
  position: absolute; left: -48px; right: 0;
  height: 1px; background: #E05C40; z-index: 10; pointer-events: none;
}
.now-line::before {
  content: ''; position: absolute; left: 48px; top: -3px;
  width: 6px; height: 6px; background: #E05C40; border-radius: 50%;
}

/* ── TIME BLOCKS ── */
.time-block {
  position: absolute; left: 2px; right: 2px;
  border-radius: 5px; padding: 4px 7px;
  cursor: grab; overflow: hidden; z-index: 5;
  user-select: none;
  box-shadow: none !important;
  filter: none !important;
}
.time-block:hover { opacity: 0.85; }
.time-block.selected { outline: 2px solid #FB7185; outline-offset: 1px; z-index: 6; }
.time-block.is-creating { opacity: 0.8; cursor: crosshair; pointer-events: none; }
.time-block.is-dragging { opacity: 0.2; pointer-events: none; }

.block-title {
  font-size: 10px; font-weight: 600; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.block-meta {
  font-family: 'DM Mono', monospace; font-size: 9px; opacity: 0.65; margin-top: 1px;
  white-space: nowrap; overflow: hidden;
}
.resize-handle {
  position: absolute; bottom: 0; left: 0; right: 0; height: 7px;
  cursor: ns-resize;
  border-radius: 0 0 5px 5px;
}

/* インポートボタン */
.import-btn {
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
  background: none; border: 1px solid var(--border);
  padding: 5px 10px; border-radius: 5px; cursor: pointer;
  color: var(--text-secondary); display: flex; align-items: center; gap: 5px;
  transition: background 0.15s;
}
.import-btn:hover { background: var(--accent-light); }
.import-btn svg { flex-shrink: 0; }
.import-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: #94A3B8; color: #fff;
  font-size: 9px; font-weight: 600; border-radius: 3px;
  padding: 1px 5px; margin-left: 2px; letter-spacing: 0.02em;
}

.drag-clone {
  position: fixed; border-radius: 5px; padding: 4px 7px;
  overflow: hidden; z-index: 500; pointer-events: none;
  opacity: 0.9; user-select: none;
}
.drop-ghost {
  position: absolute; left: 2px; right: 2px; border-radius: 5px;
  border: 2px dashed var(--text-muted); background: rgba(26,26,24,0.05);
  pointer-events: none; z-index: 4;
}

/* ══════════════════════════════════════
   HOURS VIEW (工数管理)
══════════════════════════════════════ */
.hours-view {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.hours-sidebar {
  width: var(--task-panel);
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.hours-sidebar-head {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
}
.hours-sidebar-title {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-muted);
}
.hours-sidebar-tasks {
  flex: 1; overflow-y: auto; padding: 6px;
}
.hours-sidebar-tasks::-webkit-scrollbar { width: 3px; }
.hours-sidebar-tasks::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.hours-main {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
  max-width: 760px;
}
.hours-main::-webkit-scrollbar { width: 4px; }
.hours-main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.hours-controls {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.hours-controls label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-muted);
}
.date-input-wrap { display: flex; align-items: center; gap: 8px; }
.date-input {
  font-family: 'DM Mono', monospace; font-size: 13px;
  border: 1px solid var(--border); border-radius: 7px;
  padding: 6px 10px; background: var(--bg); color: var(--text-primary);
  outline: none; transition: border-color 0.15s;
}
.date-input:focus { border-color: var(--accent); }
.period-btns { display: flex; gap: 4px; }
.period-btn {
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
  background: none; border: 1px solid var(--border);
  padding: 5px 10px; border-radius: 5px; cursor: pointer;
  color: var(--text-secondary); transition: all 0.15s;
}
.period-btn:hover { background: var(--accent-light); }
.period-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.hours-section-title {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 12px;
}

.hours-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 8px;
}
.hours-table th {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-muted);
  text-align: left; padding: 0 0 8px;
  border-bottom: 1px solid var(--border);
}
.hours-table th:last-child { text-align: right; }
.hours-table td {
  padding: 12px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.hours-table td:last-child {
  text-align: right;
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
}
.hours-table tr:last-child td { border-bottom: none; }

.td-color { width: 28px; }
.td-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block;
}
.td-planned {
  font-family: 'DM Mono', monospace; font-size: 13px;
  color: var(--text-muted); text-align: right; padding-right: 16px;
}
.td-bar-cell { width: 120px; padding-right: 16px !important; }
.hours-bar-bg {
  height: 4px; background: var(--border-light); border-radius: 2px; overflow: hidden;
}
.hours-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

.hours-total-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0 0;
  border-top: 2px solid var(--border);
  margin-top: 4px;
}
.hours-total-label {
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--text-secondary);
}
.hours-total-value {
  font-family: 'DM Mono', monospace;
  font-size: 22px; font-weight: 500;
  color: var(--text-primary);
}
.hours-empty {
  padding: 40px 0; text-align: center;
  font-size: 13px; color: var(--text-muted);
}

/* ── MOBILE ── */
@media (max-width: 640px) {
  header { padding: 0 12px; gap: 0; height: 48px; }
  .logo { display: none; }
  .tabs { margin-right: 8px; }
  .tab-btn { padding: 0 10px; font-size: 12px; }
  .week-nav { gap: 4px; }
  .week-nav button { width: 28px; height: 28px; font-size: 14px; }
  .week-label { font-size: 11px; min-width: 100px; }
  .import-btn span:not(.import-badge) { display: none; }
  .import-btn { padding: 5px 8px; }
  .today-btn { padding: 5px 8px; font-size: 11px; }

  .task-panel { display: none; }

  :root { --hour-h: 48px; }
  .day-headers { padding-left: 36px; }
  .time-axis { width: 36px; }
  .time-tick { padding-right: 6px; }
  .time-tick span { font-size: 8px; }
  .day-name { font-size: 8px; }
  .day-num { font-size: 14px; }
  .day-header.today .day-num { width: 22px; height: 22px; font-size: 12px; }

  .now-line { left: -36px; }
  .now-line::before { left: 36px; }

  .block-title { font-size: 9px; }
  .block-meta { font-size: 8px; }

  .hint { display: none; }

  .modal { width: calc(100vw - 32px); padding: 20px 16px; }

  .hours-view { padding: 16px; }
  .hours-controls { flex-wrap: wrap; gap: 10px; }
  .period-btns { flex-wrap: wrap; }
  .td-bar-cell { display: none; }
  .td-planned { padding-right: 8px !important; }
}

.modal-overlay {
  position: fixed; inset: 0; background: rgba(26,26,24,0.28);
  backdrop-filter: blur(4px); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.18s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-radius: 12px; padding: 24px; width: 320px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.13);
  transform: translateY(6px); transition: transform 0.18s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
.modal-title { font-size: 14px; font-weight: 600; }
.modal-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.modal-close {
  background: var(--accent-light); border: none; width: 26px; height: 26px;
  border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center; transition: background 0.15s;
  flex-shrink: 0;
}
.modal-close:hover { background: var(--border); }
.form-group { margin-bottom: 12px; }
.form-label {
  display: block; font-size: 10px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 5px;
}
.form-input {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px;
  border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px;
  background: var(--bg); color: var(--text-primary); outline: none;
  transition: border-color 0.15s; appearance: none;
}
.form-input:focus { border-color: var(--accent); }
.color-row { display: flex; gap: 8px; }
.color-swatch {
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
  flex-shrink: 0;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--accent); box-shadow: 0 0 0 2px #fff inset; }
.modal-actions { display: flex; gap: 7px; margin-top: 18px; }
.btn-primary {
  flex: 1; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
  background: var(--accent); color: #fff; border: none;
  padding: 9px; border-radius: 7px; cursor: pointer; transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.78; }
.btn-secondary {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  background: none; color: var(--text-secondary); border: 1px solid var(--border);
  padding: 9px 14px; border-radius: 7px; cursor: pointer; transition: background 0.15s;
}
.btn-secondary:hover { background: var(--accent-light); }
.btn-delete {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  background: none; color: #E05C40; border: 1px solid #FDDDD7;
  padding: 9px 12px; border-radius: 7px; cursor: pointer; transition: background 0.15s;
}
.btn-delete:hover { background: #FFF5F3; }

/* ── ALL-DAY ROW ── */
.allday-row {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding-left: 48px;
  padding-right: 4px; /* スクロールバー幅分オフセット */
  flex-shrink: 0;
  min-height: 22px;
}
.allday-cell {
  flex: 1; border-right: 1px solid var(--border-light);
  padding: 2px 3px; min-height: 22px;
}
.allday-cell:last-child { border-right: none; }
.allday-cell.weekend { background: var(--weekend-bg); }
.allday-chip {
  font-size: 9px; font-weight: 600;
  background: #F0F9FF; color: #0C4A6E;
  border-left: 2px solid #38BDF8;
  border-radius: 3px; padding: 1px 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.7; display: block;
}

@media (max-width: 640px) {
  .allday-row { padding-left: 36px; }
}

.hint {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: var(--text-muted); background: var(--surface);
  border: 1px solid var(--border); padding: 5px 12px; border-radius: 16px;
  pointer-events: none; letter-spacing: 0.02em; white-space: nowrap;
}

/* ── SCHEDULE SETTINGS MODAL ── */
#scheduleModal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  display: none; align-items: center; justify-content: center; z-index: 200;
}
#scheduleModal.open { display: flex; }
.sched-modal {
  background: var(--surface); border-radius: 14px;
  padding: 24px; width: 440px; max-width: calc(100vw - 32px);
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
}
.sched-modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.sched-section { margin-bottom: 16px; }
.sched-section label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.06em; display: block; margin-bottom: 6px; text-transform: uppercase; }
.sched-members { display: flex; flex-direction: column; gap: 4px; }
.sched-member-row { display: flex; align-items: center; gap: 6px; }
.sched-member-row input[type=text] {
  flex: 1; font-family: inherit; font-size: 12px;
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 9px; background: var(--bg); color: var(--text-primary);
}
.sched-member-row input[type=text]:focus { outline: none; border-color: var(--accent); }

<script>
// ═══════════════════════════════════════════════
// 定数
// ═══════════════════════════════════════════════
const HOUR_H = 56;
const SNAP_MIN = 30;
const SNAP_PX  = HOUR_H * SNAP_MIN / 60; // 28px

// 分数を "1h" "1.5h" "2h" のようにきれいに表示
function fmtHours(min) {
  const h = min / 60;
  if (h === Math.floor(h)) return `${h}h`;
  return `${h.toFixed(1)}h`;
}

const COLORS = [
  { bg: '#FFF1F2', text: '#9F1239', accent: '#FB7185' }, // ピンク
  { bg: '#ECFEFF', text: '#155E75', accent: '#22D3EE' }, // 水色
  { bg: '#EFF6FF', text: '#1E40AF', accent: '#60A5FA' }, // 青
  { bg: '#F5F3FF', text: '#5B21B6', accent: '#A78BFA' }, // ライトパープル
];

// ═══════════════════════════════════════════════
// 状態
// ═══════════════════════════════════════════════
let blocks  = JSON.parse(localStorage.getItem('tb_blocks')  || '[]');
let tasks   = JSON.parse(localStorage.getItem('tb_tasks')   || '[]');
let allDayEvents = JSON.parse(localStorage.getItem('tb_allday') || '[]');
let weekStart = getWeekStart(new Date());

// GitHub 同期
let ghConfig = JSON.parse(localStorage.getItem('tb_gh_config') || 'null') || { token: '', repo: '', path: 'data.json' };
let autoSyncTimer = null;

// モーダル状態
let modal = { mode: null, editId: null, pending: null, colorIdx: 0 };

// 工数管理タブ
let hoursPeriod = 'day';

// ═══════════════════════════════════════════════
// ユーティリティ
// ═══════════════════════════════════════════════
function getWeekStart(d) {
  // 日曜始まり
  const dt = new Date(d);
  dt.setDate(dt.getDate() - dt.getDay());
  dt.setHours(0,0,0,0);
  return dt;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function isoDate(d) {
  // ローカル日付をYYYY-MM-DDで返す（toISOStringはUTC基準なのでNG）
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function fmtTime(h, m) { return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function pxToHM(px) {
  const totalMin = Math.round(px / HOUR_H * 60 / SNAP_MIN) * SNAP_MIN;
  const clamped  = Math.max(0, Math.min(totalMin, 24*60 - SNAP_MIN));
  return { h: Math.floor(clamped/60), m: clamped%60 };
}
function hmToPx(h, m) { return (h + m/60) * HOUR_H; }
function snapPx(px)   { return Math.max(0, Math.round(px / SNAP_PX) * SNAP_PX); }

// clientY → gridScroll内の絶対top値
function clientToTop(clientY) {
  const gs = document.getElementById('gridScroll');
  return clientY - gs.getBoundingClientRect().top + gs.scrollTop;
}

function saveBlocks(noSync) { localStorage.setItem('tb_blocks', JSON.stringify(blocks)); if (!noSync) scheduleAutoSync(); }
function saveTasks(noSync)  { localStorage.setItem('tb_tasks',  JSON.stringify(tasks));  if (!noSync) scheduleAutoSync(); }

// ═══════════════════════════════════════════════
// ヘッダー描画
// ═══════════════════════════════════════════════
// 日本の祝日（2024〜2026年）
// ═══════════════════════════════════════════════
const JP_HOLIDAYS = new Set([
  // 2026
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
  '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23',
  // 2027
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23',
  '2027-03-21','2027-03-22','2027-04-29','2027-05-03','2027-05-04','2027-05-05',
  '2027-07-19','2027-08-11','2027-09-20','2027-09-23',
  '2027-10-11','2027-11-03','2027-11-23',
  // 2028
  '2028-01-01','2028-01-10','2028-02-11','2028-02-23',
  '2028-03-20','2028-04-29','2028-05-03','2028-05-04','2028-05-05',
  '2028-07-17','2028-08-11','2028-09-18','2028-09-21','2028-09-22',
  '2028-10-09','2028-11-03','2028-11-23',
  // 2029
  '2029-01-01','2029-01-08','2029-02-11','2029-02-12','2029-02-23',
  '2029-03-20','2029-04-29','2029-04-30','2029-05-03','2029-05-04','2029-05-05',
  '2029-07-16','2029-08-11','2029-08-12','2029-09-17','2029-09-23',
  '2029-10-08','2029-11-03','2029-11-23',
  // 2030
  '2030-01-01','2030-01-14','2030-02-11','2030-02-23',
  '2030-03-20','2030-04-29','2030-05-03','2030-05-04','2030-05-05','2030-05-06',
  '2030-07-15','2030-08-11','2030-08-12','2030-09-16','2030-09-22','2030-09-23',
  '2030-10-14','2030-11-03','2030-11-04','2030-11-23',
]);
function isHoliday(dateStr) { return JP_HOLIDAYS.has(dateStr); }

const DAY_NAMES = ['日','月','火','水','木','金','土'];

function renderHeader() {
  const we  = addDays(weekStart, 6);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('weekLabel').textContent =
    `${weekStart.getFullYear()}年 ${fmt(weekStart)} – ${fmt(we)}`;

  // 月ラベル：週の土曜日の月を表示
  const sat = new Date(weekStart); sat.setDate(sat.getDate() + 6);
  document.getElementById('monthLabel').textContent =
    `${sat.getFullYear()}年${sat.getMonth()+1}月`;

  const today = isoDate(new Date());
  const cont  = document.getElementById('dayHeaders');
  cont.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = addDays(weekStart, i);
    const isWeekend = (i === 0 || i === 6);
    const el = document.createElement('div');
    const isHol = isHoliday(isoDate(d));
    el.className = 'day-header' + (isWeekend || isHol ? ' weekend' : '') + (isoDate(d)===today ? ' today' : '');
    el.innerHTML = `<span class="day-name">${DAY_NAMES[d.getDay()]}</span><span class="day-num">${d.getDate()}</span>`;
    cont.appendChild(el);
  }
  renderAlldayRow();
}

function renderAlldayRow() {
  const row = document.getElementById('alldayRow');
  row.innerHTML = '';
  const wsStr = isoDate(weekStart);
  const weStr = isoDate(addDays(weekStart, 6));
  // 今週分のイベントをdateでインデックス化
  const byDate = {};
  allDayEvents.forEach(ev => {
    if (ev.date >= wsStr && ev.date <= weStr) {
      if (!byDate[ev.date]) byDate[ev.date] = [];
      byDate[ev.date].push(ev.summary);
    }
  });
  for (let i = 0; i < 7; i++) {
    const d = addDays(weekStart, i);
    const dateStr = isoDate(d);
    const isWeekend = (i === 0 || i === 6);
    const isHol = isHoliday(dateStr);
    const cell = document.createElement('div');
    cell.className = 'allday-cell' + (isWeekend || isHol ? ' weekend' : '');
    (byDate[dateStr] || []).forEach(summary => {
      const chip = document.createElement('div');
      chip.className = 'allday-chip';
      chip.textContent = summary;
      chip.title = summary;
      cell.appendChild(chip);
    });
    row.appendChild(cell);
  }
}

// ═══════════════════════════════════════════════
// グリッド描画
// ═══════════════════════════════════════════════
function renderGrid() {
  const axis = document.getElementById('timeAxis');
  const cols = document.getElementById('dayColumns');
  axis.innerHTML = ''; cols.innerHTML = '';

  for (let h = 0; h < 24; h++) {
    const t = document.createElement('div');
    t.className = 'time-tick'; t.style.top = `${h * HOUR_H}px`;
    if (h > 0) t.innerHTML = `<span>${String(h).padStart(2,'0')}:00</span>`;
    axis.appendChild(t);
  }

  const today = isoDate(new Date());
  for (let i = 0; i < 7; i++) {
    const d = addDays(weekStart, i);
    const dateStr    = isoDate(d);
    const isWeekend  = (i === 0 || i === 6);
    const isHol = isHoliday(dateStr);
    const col = document.createElement('div');
    col.className = 'day-col' + (isWeekend || isHol ? ' weekend' : '');
    col.dataset.date = dateStr;

    for (let h = 0; h < 24; h++) {
      const line = document.createElement('div');
      line.className = 'hour-line major'; line.style.top = `${h * HOUR_H}px`;
      col.appendChild(line);
    }

    if (dateStr === today) {
      const now = new Date();
      const nl = document.createElement('div');
      nl.className = 'now-line';
      nl.style.top = `${hmToPx(now.getHours(), now.getMinutes())}px`;
      col.appendChild(nl);
    }

    col.addEventListener('mousedown', onColDown);
    col.addEventListener('touchstart', onColDown, { passive: false });
    cols.appendChild(col);
  }
  renderBlocks();
}

// ═══════════════════════════════════════════════
// ブロック描画
// ═══════════════════════════════════════════════
function renderBlocks() {
  document.querySelectorAll('.time-block').forEach(el => el.remove());
  const wsStr = isoDate(weekStart);
  const weStr = isoDate(addDays(weekStart, 6));
  blocks.forEach(b => {
    if (b.date < wsStr || b.date > weStr) return;
    const col = document.querySelector(`.day-col[data-date="${b.date}"]`);
    if (col) col.appendChild(makeBlockEl(b));
  });
}

let selectedBlockId = null;

function selectBlock(id) {
  // 以前の選択を解除
  document.querySelectorAll('.time-block.selected').forEach(el => el.classList.remove('selected'));
  selectedBlockId = id;
  if (id) {
    const el = document.querySelector(`.time-block[data-id="${id}"]`);
    if (el) el.classList.add('selected');
  }
}

function makeBlockEl(b) {
  const el  = document.createElement('div');
  el.className = 'time-block'; el.dataset.id = b.id;
  if (selectedBlockId === b.id) el.classList.add('selected');
  applyBlockStyle(el, b);

  let didMove = false;

  const onBlockStart = e => {
    if (e.target.classList.contains('resize-handle')) return;
    if (e.type === 'mousedown' && e.button !== 0) return;
    e.stopPropagation();
    didMove = false;
    startBlockMove(b, el, e, () => { didMove = true; });
  };
  el.addEventListener('mousedown', onBlockStart);
  el.addEventListener('touchstart', onBlockStart, { passive: false });

  el.addEventListener('click', e => {
    if (e.target.classList.contains('resize-handle')) return;
    if (didMove) { didMove = false; return; }
    selectBlock(selectedBlockId === b.id ? null : b.id);
  });
  el.addEventListener('dblclick', e => {
    if (e.target.classList.contains('resize-handle')) return;
    e.stopPropagation();
    openBlockEditModal(b.id);
  });

  const onResizeStart = e => {
    e.stopPropagation(); startResize(b, el, e);
  };
  el.querySelector('.resize-handle').addEventListener('mousedown', onResizeStart);
  el.querySelector('.resize-handle').addEventListener('touchstart', onResizeStart, { passive: false });
  return el;
}

function applyBlockStyle(el, b) {
  const c = COLORS[b.colorIdx % COLORS.length || 0];
  const actualH  = fmtHours(b.durationMin);
  const plannedH = b.plannedH != null ? ` / ${fmtHours(b.plannedH * 60)}予定` : '';
  el.style.cssText = `top:${hmToPx(b.startH,b.startM)+2}px;height:${Math.max(14,(b.durationMin/60)*HOUR_H-4)}px;background:${c.bg};border:none;border-left:3px solid ${c.accent};color:${c.text};`;
  el.innerHTML = `<div class="block-title">${b.title||'—'}</div><div class="block-meta">${fmtTime(b.startH,b.startM)} · ${actualH}実績${plannedH}</div><div class="resize-handle"></div>`;
}

// ═══════════════════════════════════════════════
// タスクパネル
// ═══════════════════════════════════════════════
function renderTasks() {
  const list = document.getElementById('taskList');
  list.innerHTML = '';
  tasks.forEach(t => list.appendChild(makeTaskEl(t)));
}

function renderHoursSidebar() {
  const list = document.getElementById('hoursSidebarTasks');
  list.innerHTML = '';
  tasks.forEach(t => {
    const c = COLORS[t.colorIdx % COLORS.length || 0];
    const el = document.createElement('div');
    el.className = 'task-item';
    el.style.cssText = `background:${c.bg};border-left-color:${c.accent};color:${c.text};cursor:default;`;
    el.innerHTML = `<div class="task-item-title">${t.title}</div><div class="task-item-hours">${t.plannedH}h予定</div>`;
    list.appendChild(el);
  });
}

function makeTaskEl(t) {
  const el  = document.createElement('div');
  el.className = 'task-item'; el.dataset.taskId = t.id;
  const c = COLORS[t.colorIdx % COLORS.length || 0];
  el.style.cssText = `background:${c.bg};border-left-color:${c.accent};color:${c.text};`;
  el.innerHTML = `<div class="task-item-title">${t.title}</div><div class="task-item-hours">${t.plannedH}h予定</div>`;

  // タスクからドラッグ
  let taskDidMove = false;
  const onTaskStart = e => {
    if (e.type === 'mousedown' && e.button !== 0) return;
    taskDidMove = false;
    startTaskDrag(t, el, e, () => { taskDidMove = true; });
  };
  el.addEventListener('mousedown', onTaskStart);
  el.addEventListener('touchstart', onTaskStart, { passive: false });
  el.addEventListener('click', e => {
    if (taskDidMove) { taskDidMove = false; return; }
    openTaskEditModal(t.id);
  });
  return el;
}

// clientY → gridScroll内絶対top値 (=day-col内のtop値)
// top値 = clientY - gs.getBoundingClientRect().top + gs.scrollTop
// (gsはスクロールしても画面上の位置は変わらない)

// タッチ/マウス両対応のクライアント座標取得
function evClient(e) {
  if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

// イベントリスナーをmouse/touch両方に登録
function addMoveListener(fn) {
  document.addEventListener('mousemove', fn);
  document.addEventListener('touchmove', fn, { passive: false });
}
function removeMoveListener(fn) {
  document.removeEventListener('mousemove', fn);
  document.removeEventListener('touchmove', fn);
}
function addUpListener(fn) {
  document.addEventListener('mouseup', fn);
  document.addEventListener('touchend', fn);
}
function removeUpListener(fn) {
  document.removeEventListener('mouseup', fn);
  document.removeEventListener('touchend', fn);
}

// ═══════════════════════════════════════════════
// 新規作成ドラッグ (空きをドラッグ)
// ═══════════════════════════════════════════════
function onColDown(e) {
  if (e.target.closest('.time-block')) return;
  if (e.type === 'mousedown' && e.button !== 0) return;
  if (e.type === 'touchstart') e.preventDefault();

  const col    = e.currentTarget;
  const date   = col.dataset.date;
  const { y }  = evClient(e);
  const startPx = snapPx(clientToTop(y));

  const c = COLORS[0];
  const live = document.createElement('div');
  live.className = 'time-block is-creating';
  live.style.cssText = `top:${startPx}px;height:${SNAP_PX}px;background:${c.bg};border:none;border-left:3px solid ${c.accent};color:${c.text};`;
  live.innerHTML = `<div class="block-title">—</div><div class="block-meta"></div>`;
  col.appendChild(live);

  let endPx = startPx;

  const onMove = e2 => {
    if (e2.cancelable) e2.preventDefault();
    const { y: cy } = evClient(e2);
    endPx = snapPx(clientToTop(cy));
    const top = Math.min(startPx, endPx);
    const h   = Math.max(Math.abs(endPx - startPx), SNAP_PX);
    live.style.top    = `${top}px`;
    live.style.height = `${h}px`;
    const t = pxToHM(top), dur = Math.round(h / HOUR_H * 60);
    live.querySelector('.block-meta').textContent = `${fmtTime(t.h,t.m)} · ${fmtHours(dur)}`;
  };

  const onUp = () => {
    removeMoveListener(onMove);
    removeUpListener(onUp);
    live.remove();
    const topPx = Math.min(startPx, endPx);
    const botPx = Math.max(endPx, startPx + SNAP_PX);
    const t   = pxToHM(topPx);
    const dur = Math.max(SNAP_MIN, Math.round((botPx-topPx)/HOUR_H*60/SNAP_MIN)*SNAP_MIN);
    openCreateModal(date, t.h, t.m, dur);
  };

  addMoveListener(onMove);
  addUpListener(onUp);
}

// ═══════════════════════════════════════════════
// ブロック移動ドラッグ
// ═══════════════════════════════════════════════
function startBlockMove(b, el, e, onMoved) {
  const THRESH = 5;
  const { x: sx, y: sy } = evClient(e);
  const grabOffset = clientToTop(sy) - parseFloat(el.style.top);
  let dragging = false, clone = null, ghost = null;
  let targetCol = el.parentElement;

  const onMove = e2 => {
    if (e2.cancelable) e2.preventDefault();
    const { x: cx, y: cy } = evClient(e2);
    if (!dragging) {
      if (Math.abs(cx-sx)<THRESH && Math.abs(cy-sy)<THRESH) return;
      dragging = true; onMoved();
      el.classList.add('is-dragging');
      const c = COLORS[b.colorIdx % COLORS.length || 0];
      clone = document.createElement('div');
      clone.className = 'block-clone';
      clone.style.cssText = `width:${el.offsetWidth}px;height:${el.offsetHeight}px;background:${c.bg};border:none;border-left:3px solid ${c.accent};color:${c.text};`;
      clone.innerHTML = `<div class="block-title">${b.title}</div>`;
      document.body.appendChild(clone);
      ghost = document.createElement('div');
      ghost.className = 'drop-ghost'; ghost.style.height = `${el.offsetHeight}px`;
      targetCol.appendChild(ghost); targetCol.classList.add('drop-target');
    }

    clone.style.top  = `${cy - grabOffset}px`;
    clone.style.left = `${cx - 10}px`;

    let found = null;
    for (const col of document.querySelectorAll('.day-col')) {
      const r = col.getBoundingClientRect();
      if (cx >= r.left && cx < r.right) { found = col; break; }
    }
    if (!found) return;
    if (found !== targetCol) {
      targetCol.classList.remove('drop-target'); ghost.remove();
      ghost = document.createElement('div');
      ghost.className = 'drop-ghost'; ghost.style.height = `${el.offsetHeight}px`;
      found.appendChild(ghost); found.classList.add('drop-target');
      targetCol = found;
    }
    ghost.style.top = `${snapPx(clientToTop(cy) - grabOffset)}px`;
  };

  const onUp = e2 => {
    removeMoveListener(onMove);
    removeUpListener(onUp);
    if (!dragging) return;
    clone.remove(); ghost.remove();
    el.classList.remove('is-dragging');
    targetCol.classList.remove('drop-target');
    const { y: uy } = evClient(e2);
    const t = pxToHM(snapPx(clientToTop(uy) - grabOffset));
    b.date = targetCol.dataset.date; b.startH = t.h; b.startM = t.m;
    saveBlocks(); renderBlocks(); renderHours();
  };

  addMoveListener(onMove);
  addUpListener(onUp);
}

// ═══════════════════════════════════════════════
// タスク → タイムブロック ドラッグ
// ═══════════════════════════════════════════════
function startTaskDrag(t, taskEl, e) {
  const THRESH = 5;
  const { x: sx, y: sy } = evClient(e);
  let dragging = false, clone = null, ghost = null;
  let targetCol = null;

  const onMove = e2 => {
    if (e2.cancelable) e2.preventDefault();
    const { x: cx, y: cy } = evClient(e2);
    if (!dragging) {
      if (Math.abs(cx-sx)<THRESH && Math.abs(cy-sy)<THRESH) return;
      dragging = true;
      taskEl.classList.add('dragging');
      const c = COLORS[t.colorIdx % COLORS.length || 0];
      clone = document.createElement('div');
      clone.className = 'block-clone';
      clone.style.cssText = `width:160px;height:${SNAP_PX*4}px;background:${c.bg};border:none;border-left:3px solid ${c.accent};color:${c.text};`;
      clone.innerHTML = `<div class="block-title">${t.title}</div><div class="block-meta">${t.plannedH}h予定</div>`;
      document.body.appendChild(clone);
    }

    clone.style.top  = `${cy - 20}px`;
    clone.style.left = `${cx - 10}px`;

    let found = null;
    for (const col of document.querySelectorAll('.day-col')) {
      const r = col.getBoundingClientRect();
      if (cx >= r.left && cx < r.right) { found = col; break; }
    }
    if (found !== targetCol) {
      if (targetCol) { targetCol.classList.remove('drop-target'); if (ghost) ghost.remove(); ghost = null; }
      targetCol = found;
      if (targetCol) {
        ghost = document.createElement('div');
        ghost.className = 'drop-ghost';
        ghost.style.height = `${Math.round(t.plannedH * HOUR_H)}px`;
        targetCol.appendChild(ghost);
        targetCol.classList.add('drop-target');
      }
    }
    if (ghost && targetCol) {
      ghost.style.top = `${snapPx(clientToTop(cy))}px`;
    }
  };

  const onUp = e2 => {
    removeMoveListener(onMove);
    removeUpListener(onUp);
    taskEl.classList.remove('dragging');
    if (!dragging) return;
    clone.remove();
    if (ghost) ghost.remove();
    if (targetCol) {
      targetCol.classList.remove('drop-target');
      const { y: uy } = evClient(e2);
      const topPx = snapPx(clientToTop(uy));
      const tm = pxToHM(topPx);
      const dur = Math.round(t.plannedH * 60);
      const newBlock = {
        id: uid(),
        date: targetCol.dataset.date,
        startH: tm.h, startM: tm.m,
        durationMin: dur,
        title: t.title,
        colorIdx: t.colorIdx || 0,
        plannedH: t.plannedH,
      };
      blocks.push(newBlock);
      saveBlocks(); renderBlocks(); renderHours();
    }
  };

  addMoveListener(onMove);
  addUpListener(onUp);
}

// ═══════════════════════════════════════════════
// リサイズ
// ═══════════════════════════════════════════════
function startResize(b, el, e) {
  if (e.cancelable) e.preventDefault();
  const { y: startY } = evClient(e);
  const startH = el.offsetHeight;
  const onMove = e2 => {
    if (e2.cancelable) e2.preventDefault();
    const { y: cy } = evClient(e2);
    const newH = Math.max(SNAP_PX, snapPx(startH + cy - startY));
    el.style.height = `${newH}px`;
    b.durationMin = Math.round(newH / HOUR_H * 60);
    const plannedH = b.plannedH != null ? ` / ${fmtHours(b.plannedH * 60)}予定` : '';
    el.querySelector('.block-meta').textContent = `${fmtTime(b.startH,b.startM)} · ${fmtHours(b.durationMin)}実績${plannedH}`;
  };
  const onUp = () => {
    removeMoveListener(onMove);
    removeUpListener(onUp);
    saveBlocks(); renderHours();
  };
  addMoveListener(onMove);
  addUpListener(onUp);
}

// ═══════════════════════════════════════════════
// モーダル（ブロック作成）
// ═══════════════════════════════════════════════
function buildColorPicker(selectedIdx) {
  const cp = document.getElementById('colorPicker');
  cp.innerHTML = '';
  COLORS.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (i === selectedIdx ? ' selected' : '');
    sw.style.background = c.accent;
    sw.onclick = () => {
      modal.colorIdx = i;
      cp.querySelectorAll('.color-swatch').forEach((s, j) => s.classList.toggle('selected', j === i));
    };
    cp.appendChild(sw);
  });
}

// タイトルから「同じ日付・予定工数が設定されている最初のブロック」の plannedH を返す（自分自身は除く）
function getFirstPlannedH(title, excludeId, date) {
  if (!title || !date) return null;
  const match = blocks
    .filter(b => b.title === title && b.id !== excludeId && b.date === date && b.plannedH != null)
    .sort((a,b) => a.startH - b.startH || a.startM - b.startM)[0];
  return match?.plannedH ?? null;
}
function applyPlannedHField(title, selfId, date) {
  const inp = document.getElementById('inputHours');
  const firstH = getFirstPlannedH(title, selfId, date);
  if (firstH !== null) {
    inp.value = firstH;
    inp.readOnly = true;
    inp.style.color = 'var(--text-muted)';
    inp.title = '同日・同名の先行ブロックの予定工数を引き継いでいます（合計に含まれません）';
  } else {
    inp.readOnly = false;
    inp.style.color = '';
    inp.title = '';
  }
}

function openBlockEditModal(id) {
  const b = blocks.find(x=>x.id===id); if(!b) return;
  const colorIdx = b.colorIdx ?? 0;
  modal = { mode:'edit-block', editId:id, pending:null, colorIdx };
  document.getElementById('modalHeading').textContent = 'ブロックを編集';
  document.getElementById('modalSub').textContent = `${b.date} ${fmtTime(b.startH,b.startM)}`;
  document.getElementById('inputTitle').value = b.title;
  document.getElementById('inputHours').value = b.plannedH ?? '';
  document.getElementById('hoursGroup').style.display = '';
  applyPlannedHField(b.title, id, b.date);
  setModalActions('edit-block');
  buildColorPicker(colorIdx);
  openModal();
  document.getElementById('inputTitle').oninput = e =>
    applyPlannedHField(e.target.value.trim(), id, b.date);
}

function openCreateModal(date, h, m, dur) {
  modal = { mode:'create', editId:null, pending:{date,startH:h,startM:m,durationMin:dur}, colorIdx:0 };
  document.getElementById('modalHeading').textContent = 'タイムブロックを追加';
  document.getElementById('modalSub').textContent = `${date} ${fmtTime(h,m)} — ${dur}分`;
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputHours').value = (dur/60);
  document.getElementById('hoursGroup').style.display = '';
  // 初期状態はロックなし。タイトル入力時に同名チェック
  const inp = document.getElementById('inputHours');
  inp.readOnly = false; inp.style.color = ''; inp.title = '';
  setModalActions('create');
  buildColorPicker(0);
  openModal();
  document.getElementById('inputTitle').oninput = e => {
    const title = e.target.value.trim();
    applyPlannedHField(title, null, date);
    // 同日同名なければdur/60をデフォルト表示
    if (!title || getFirstPlannedH(title, null, date) === null) {
      if (!document.getElementById('inputHours').readOnly)
        document.getElementById('inputHours').value = (dur/60);
    }
  };
}

function openTaskEditModal(id) {
  const t = id ? tasks.find(x=>x.id===id) : null;
  const isNew = !t;
  const colorIdx = t?.colorIdx ?? 0;
  modal = { mode: isNew ? 'new-task' : 'edit-task', editId: id||null, pending:null, colorIdx };
  document.getElementById('modalHeading').textContent = isNew ? 'タスクを追加' : 'タスクを編集';
  document.getElementById('modalSub').textContent = '';
  document.getElementById('inputTitle').value = t?.title||'';
  document.getElementById('inputHours').value = t?.plannedH||'';
  document.getElementById('hoursGroup').style.display = '';
  setModalActions(isNew ? 'create' : 'edit-task');
  buildColorPicker(colorIdx);
  openModal();
}

function setModalActions(type) {
  const el = document.getElementById('modalActions');
  if (type === 'create') {
    el.innerHTML = `<button class="btn-secondary" id="modalCancel">キャンセル</button><button class="btn-primary" id="modalSave">保存</button>`;
  } else if (type === 'edit-block') {
    el.innerHTML = `<button class="btn-delete" id="modalDelete">削除</button><button class="btn-secondary" id="modalCancel">キャンセル</button><button class="btn-primary" id="modalSave">保存</button>`;
    document.getElementById('modalDelete').onclick = () => {
      blocks = blocks.filter(b=>b.id!==modal.editId);
      saveBlocks(); renderBlocks(); renderHours();
      closeModal();
    };
  } else if (type === 'edit-task') {
    el.innerHTML = `<button class="btn-delete" id="modalDelete">削除</button><button class="btn-secondary" id="modalCancel">キャンセル</button><button class="btn-primary" id="modalSave">保存</button>`;
    document.getElementById('modalDelete').onclick = () => {
      tasks = tasks.filter(t=>t.id!==modal.editId); saveTasks(); renderTasks();
      closeModal();
    };
  }
  document.getElementById('modalCancel').onclick = closeModal;
  document.getElementById('modalSave').onclick = saveModal;
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('inputTitle').focus(), 80);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modal = { mode:null, editId:null, pending:null, colorIdx:0 };
}

function saveModal() {
  const title = document.getElementById('inputTitle').value.trim();
  if (!title) { document.getElementById('inputTitle').focus(); return; }
  const hrs = parseFloat(document.getElementById('inputHours').value) || 1;

  if (modal.mode === 'create') {
    const p = modal.pending;
    // 同日・同名の先行ブロックがあればplannedHはnull（合計に含めない）
    const isFirst = getFirstPlannedH(title, null, p.date) === null;
    blocks.push({ id:uid(), date:p.date, startH:p.startH, startM:p.startM, durationMin:p.durationMin, title, colorIdx:modal.colorIdx, plannedH: isFirst ? hrs : null });
    saveBlocks(); renderBlocks(); renderHours();
  } else if (modal.mode === 'edit-block') {
    const b = blocks.find(x=>x.id===modal.editId);
    if (b) {
      b.title = title; b.colorIdx = modal.colorIdx;
      // 同日で自分が最初のブロックのときだけplannedHを保存
      const isFirst = getFirstPlannedH(title, modal.editId, b.date) === null;
      b.plannedH = isFirst ? hrs : null;
    }
    saveBlocks(); renderBlocks(); renderHours();
  } else if (modal.mode === 'new-task') {
    tasks.push({ id:uid(), title, plannedH:hrs, colorIdx:modal.colorIdx });
    saveTasks(); renderTasks();
  } else if (modal.mode === 'edit-task') {
    const t = tasks.find(x=>x.id===modal.editId);
    if (t) { t.title=title; t.plannedH=hrs; t.colorIdx=modal.colorIdx; }
    saveTasks(); renderTasks();
  }
  closeModal();
}

function toggleDetail(id) {
  const rows = document.querySelectorAll(`tr#${id}`);
  rows.forEach(r => {
    const open = r.style.display !== 'none';
    r.style.display = open ? 'none' : '';
  });
  // 矢印を回転
  const btn = event.currentTarget;
  btn.style.transform = rows[0]?.style.display === 'none' ? '' : 'rotate(180deg)';
  btn.style.transition = 'transform 0.2s';
}

// ═══════════════════════════════════════════════
// 工数管理タブ
// ═══════════════════════════════════════════════
function renderHours() {
  const today = isoDate(new Date());
  let from, to;

  if (hoursPeriod === 'day') {
    from = to = today;
  } else if (hoursPeriod === 'week') {
    const ws = getWeekStart(new Date());
    from = isoDate(ws); to = isoDate(addDays(ws, 6));
  } else if (hoursPeriod === 'lastweek') {
    const ws = getWeekStart(addDays(new Date(), -7));
    from = isoDate(ws); to = isoDate(addDays(ws, 6));
  } else if (hoursPeriod === 'month') {
    const now = new Date();
    from = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0);
    to = isoDate(lastDay);
  } else {
    from = document.getElementById('dateFrom').value || today;
    to   = document.getElementById('dateTo').value   || today;
  }

  // 集計 — スペース（全角・半角）前の文字列をキーとして案件単位で集約
  function projectKey(title) {
    // 全角スペース(\u3000)・半角スペースの両方で分割し、最初のトークンを返す
    const m = title.match(/^([^\s\u3000]+)/);
    return m ? m[1] : title;
  }

  // タイトル+日付ごとに「予定工数が入っている最初のブロック」を全期間から特定
  const firstPlannedByTitle = {};
  [...blocks].sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : a.startH - b.startH || a.startM - b.startM)
    .forEach(b => {
      const tdKey = b.title + '\n' + b.date;
      if (!(tdKey in firstPlannedByTitle) && b.plannedH != null) {
        firstPlannedByTitle[tdKey] = b.plannedH;
      }
    });

  const map = {};
  const titleDateSeen = new Set(); // 期間内で「タイトル+日付」ごとにplannedHを加算済み
  [...blocks]
    .filter(b => b.date >= from && b.date <= to)
    .sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : a.startH - b.startH)
    .forEach(b => {
      const key = projectKey(b.title);
      if (!map[key]) map[key] = { key, colorIdx: b.colorIdx||0, actualMin: 0, plannedMin: 0, titles: new Set(), details: {} };
      map[key].actualMin += b.durationMin;
      // 予定工数: 同タイトル・同日付で最初の1件のplannedHを加算（日付をまたいだらリセット）
      const tdKey = b.title + '\n' + b.date;
      if (!titleDateSeen.has(tdKey)) {
        titleDateSeen.add(tdKey);
        // その日の同タイトル最初のブロックのplannedHを全期間データから取得
        const ph = firstPlannedByTitle[b.title + '\n' + b.date];
        if (ph) map[key].plannedMin += ph * 60;
      }
      map[key].titles.add(b.title);
      if (!map[key].details[b.title]) map[key].details[b.title] = { actualMin: 0, plannedMin: 0 };
      map[key].details[b.title].actualMin += b.durationMin;
      // 内訳の予定工数も同日初回のみ加算
      if (!titleDateSeen.has(tdKey + '_detail')) {
        titleDateSeen.add(tdKey + '_detail');
        const ph = firstPlannedByTitle[b.title + '\n' + b.date];
        if (ph) map[key].details[b.title].plannedMin += ph * 60;
      }
    });
  const items = Object.values(map).map(i => ({ ...i, titles: [...i.titles] }));
  const totalActual  = items.reduce((s,i) => s + i.actualMin, 0);

  const wrap = document.getElementById('hoursTableWrap');
  if (!items.length) {
    wrap.innerHTML = `<div class="hours-empty">この期間のデータがありません</div>`;
    return;
  }

  const maxActual = Math.max(...items.map(i=>i.actualMin), 1);

  const hasMultiple = items.some(i => i.titles.length > 1 || i.titles[0] !== i.key);

  let rows = items.map((i, idx) => {
    const c = COLORS[i.colorIdx % COLORS.length || 0];
    const actualH  = fmtHours(i.actualMin);
    const plannedH = i.plannedMin ? fmtHours(i.plannedMin) : '—';
    const pct = Math.min(100, (i.actualMin / maxActual * 100)).toFixed(0);
    const canExpand = i.titles.length > 1 || i.titles[0] !== i.key;

    const chevron = `<span style="display:inline-block;width:18px"></span>`;

    const detailRows = canExpand ? Object.entries(i.details).map(([title, d]) => {
      const dPlanned = d.plannedMin ? fmtHours(d.plannedMin) : '—';
      return `<tr class="detail-row" id="detail-${idx}">
        <td></td>
        <td style="padding-left:20px;font-size:11px;color:var(--text-muted)">${title}</td>
        <td class="td-planned" style="color:var(--text-muted)">${dPlanned}</td>
        <td class="td-bar-cell"></td>
        <td style="font-family:'DM Mono',monospace;font-size:13px;color:var(--text-muted);text-align:right">${fmtHours(d.actualMin)}</td>
      </tr>`;
    }).join('') : '';

    return `<tr>
      <td class="td-color"><span class="td-dot" style="background:${c.accent}"></span></td>
      <td>${chevron}<span style="font-weight:600">${i.key}</span></td>
      <td class="td-planned">${plannedH}</td>
      <td class="td-bar-cell"><div class="hours-bar-bg"><div class="hours-bar-fill" style="width:${pct}%;background:${c.accent}"></div></div></td>
      <td>${actualH}</td>

// 当番スケジュール生成
// ═══════════════════════════════════════════════

// 日本の祝日（2025〜2030）
// scheduleConfig: { members, ranges: [{from, to}] }
let scheduleConfig = JSON.parse(localStorage.getItem('tb_schedule_config') || 'null') || {
  members: ['上原','出倉','糸井','大谷'],
  ranges: [
    { from: '2026-08-13', to: '2026-08-16' }, // お盆
    { from: '2026-12-28', to: '2026-12-31' }, // 年末年始
  ]
};
// 旧形式（holidays配列）からの移行
if (scheduleConfig.holidays && !scheduleConfig.ranges) {
  scheduleConfig.ranges = scheduleConfig.holidays.map(d => ({ from: d, to: d }));
  delete scheduleConfig.holidays;
}
if (!scheduleConfig.ranges) scheduleConfig.ranges = [];

function saveScheduleConfig() {
  localStorage.setItem('tb_schedule_config', JSON.stringify(scheduleConfig));
}

function expandRanges(ranges) {
  const set = new Set();
  ranges.forEach(({ from, to }) => {
    if (!from || !to) return;
    const f = new Date(from + 'T00:00:00'), t = new Date(to + 'T00:00:00');
    for (let d = new Date(f); d <= t; d.setDate(d.getDate() + 1)) {
      set.add(isoDate(d));
    }
  });
  return set;
}

function generateSchedule() {
  const { members, ranges } = scheduleConfig;
  if (!members.length) return [];
  const closedDays = expandRanges(ranges || []);
  // 祝日も追加
  JP_HOLIDAYS.forEach(h => closedDays.add(h));

  const result = [];
  // 現在年〜5年先まで生成
  const now = new Date();
  const startYear = now.getFullYear();
  const start = new Date(startYear, 0, 7);
  const end   = new Date(startYear + 4, 11, 31);
  let memberIdx = 0;
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const dow = d.getDay();
    if (dow !== 1 && dow !== 3 && dow !== 5) continue;
    const dateStr = isoDate(d);
    if (closedDays.has(dateStr)) continue;
    result.push({ date: dateStr, summary: members[memberIdx % members.length] });
    memberIdx++;
  }
  return result;
}

document.getElementById('icsFileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result;
    const imported = parseICS(text);
    if (!imported.length) { alert('イベントが見つかりませんでした'); return; }
    // 既存のfromGcal:trueブロックを削除してから追加
    blocks = blocks.filter(b => !b.fromGcal);
    imported.forEach(b => blocks.push(b));
    saveBlocks(); renderBlocks(); renderHours();
    alert(`${imported.length}件を取り込みました`);
  };
  reader.readAsText(file, 'UTF-8');
});

function parseICS(text) {
  const result = [];
  const events = text.split('BEGIN:VEVENT').slice(1);
  events.forEach(ev => {
    const get = key => {
      const m = ev.match(new RegExp(key + '[^:]*:([^\\r\\n]+)'));
      return m ? m[1].trim() : '';
    };
    const summary = get('SUMMARY').replace(/\\,/g,',').replace(/\\n/g,' ');
    const dtstart = get('DTSTART');
    if (!dtstart || !summary) return;

    // 日時パース (YYYYMMDDTHHmmss or YYYYMMDD)
    let date, startH = 9, startM = 0, durationMin = 60;
    if (dtstart.length >= 15) {
      // datetime
      const y = dtstart.slice(0,4), mo = dtstart.slice(4,6), d = dtstart.slice(6,8);
      startH = parseInt(dtstart.slice(9,11));
      startM = parseInt(dtstart.slice(11,13));
      date = `${y}-${mo}-${d}`;
      // duration or dtend
      const dtend = get('DTEND');
      if (dtend.length >= 15) {
        const eh = parseInt(dtend.slice(9,11)), em = parseInt(dtend.slice(11,13));
        durationMin = (eh * 60 + em) - (startH * 60 + startM);
        if (durationMin <= 0) durationMin = 30;
      }
      // JSTオフセット補正 (Zサフィックスの場合 +9h)
      if (dtstart.endsWith('Z')) {
        let total = startH * 60 + startM + 540;
        if (total >= 1440) {
          const dt = new Date(date); dt.setDate(dt.getDate()+1);
          date = dt.toISOString().slice(0,10);
          total -= 1440;
        }
        startH = Math.floor(total/60); startM = total%60;
      }
    } else {
      // all-day: skip
      return;
    }
    if (durationMin < 1) durationMin = 30;
    result.push({
      id: 'gcal_' + Math.random().toString(36).slice(2),
      date, startH, startM, durationMin,
      title: summary,
      colorIdx: 0,
      plannedH: null,
      fromGcal: true
    });
  });
  return result;
}

function saveGhConfig() {
  localStorage.setItem('tb_gh_config', JSON.stringify(ghConfig));
}

function getAppData() {
  return { blocks, tasks, allDayEvents, scheduleConfig };
}

function setAppData(data) {
  if (Array.isArray(data.blocks)) {
    blocks = data.blocks;
    localStorage.setItem('tb_blocks', JSON.stringify(blocks));
  }
  if (Array.isArray(data.tasks)) {
    tasks = data.tasks;
    localStorage.setItem('tb_tasks', JSON.stringify(tasks));
  }
  if (Array.isArray(data.allDayEvents)) {
    allDayEvents = data.allDayEvents;
    localStorage.setItem('tb_allday', JSON.stringify(allDayEvents));
  }
  if (data.scheduleConfig) {
    scheduleConfig = data.scheduleConfig;
    saveScheduleConfig();
  }
  renderHeader();
  renderGrid();
  renderTasks();
}

function showGhStatus(msg, type) {
  const el = document.getElementById('ghStatus');
  if (!el) return;
  const styles = {
    syncing: 'color:#1E40AF;background:#EFF6FF',
    synced:  'color:#166534;background:#F0FDF4',
    error:   'color:#9F1239;background:#FFF1F2',
  };
  el.innerHTML = `<span class="gh-status-msg" style="${styles[type]||''}">${msg}</span>`;
}

async function syncToGitHub(silent) {
  if (!ghConfig.token || !ghConfig.repo || !ghConfig.path) {
    if (!silent) showGhStatus('トークン・リポジトリ・パスを入力してください', 'error');
    return;
  }
  if (!silent) showGhStatus('同期中…', 'syncing');
  try {
    const jsonStr = JSON.stringify(getAppData(), null, 2);
    const content = btoa(unescape(encodeURIComponent(jsonStr)));
    const apiUrl  = `https://api.github.com/repos/${ghConfig.repo}/contents/${ghConfig.path}`;
    const headers = {
      Authorization: `token ${ghConfig.token}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    };
    // 既存ファイルのSHAを取得
    let sha = '';
    const getRes = await fetch(apiUrl, { headers });
    if (getRes.ok) { const j = await getRes.json(); sha = j.sha; }
    else if (getRes.status !== 404) throw new Error(`取得エラー: ${getRes.status}`);

    const body = { message: 'Update TimeBlock data', content };
    if (sha) body.sha = sha;
    const putRes = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });
    if (!putRes.ok) throw new Error(`保存エラー: ${putRes.status}`);
    if (!silent) showGhStatus('同期完了 ✓', 'synced');
  } catch (err) {
    if (!silent) showGhStatus(`エラー: ${err.message}`, 'error');
    console.error('GitHub sync error:', err);
  }
}

async function fetchFromGitHub() {
  if (!ghConfig.token || !ghConfig.repo || !ghConfig.path) {
    showGhStatus('トークン・リポジトリ・パスを入力してください', 'error');
    return;
  }
  showGhStatus('取得中…', 'syncing');
  try {
    const apiUrl = `https://api.github.com/repos/${ghConfig.repo}/contents/${ghConfig.path}`;
    const res = await fetch(apiUrl, {
      headers: { Authorization: `token ${ghConfig.token}`, Accept: 'application/vnd.github.v3+json' },
    });
    if (!res.ok) throw new Error(`取得エラー: ${res.status}`);
    const j    = await res.json();
    const text = decodeURIComponent(escape(atob(j.content.replace(/\n/g, ''))));
    const data = JSON.parse(text);
    setAppData(data);
    showGhStatus(`取得完了 ✓ (${new Date().toLocaleTimeString('ja-JP')})`, 'synced');
  } catch (err) {
    showGhStatus(`エラー: ${err.message}`, 'error');
    console.error('GitHub fetch error:', err);
  }
}

function scheduleAutoSync() {
  if (!ghConfig.token || !ghConfig.repo) return;
  if (autoSyncTimer) clearTimeout(autoSyncTimer);
  autoSyncTimer = setTimeout(() => { autoSyncTimer = null; syncToGitHub(true); }, 3000);
}
